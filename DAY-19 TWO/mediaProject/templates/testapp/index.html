<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
        }

        .header-success {
            background: linear-gradient(45deg, #198754, #28a745);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
        }

        .header-danger {
            background: linear-gradient(45deg, #dc3545, #ff4d4d);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s ease-in-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }

        .price {
            font-weight: bold;
            font-size: 1.2rem;
            color: #198754;
        }

        .btn-custom {
            border-radius: 25px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    {% if courses %}

        <div class="header-success">
            <h1>🎓 Welcome to Course Page</h1>
            <p>Explore our premium courses and start learning today!</p>
        </div>

        <div class="row g-4">
            {% for course in courses %}
            
            <div class="col-md-4 col-sm-6">
                <div class="card h-100">
                    <img src="{{ course.image.url }}" class="card-img-top" alt="Course Image">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ course.name }}</h5>
                        <p class="card-text text-muted">{{ course.desciption }}</p>
                        <p class="price mt-auto">₹ {{ course.price }}</p>

                        <div class="d-flex justify-content-between mt-3">
                            <a href="#" class="btn btn-info btn-sm btn-custom w-50 me-2">Buy Now</a>
                            <a href="#" class="btn btn-success btn-sm btn-custom w-50">Add to Cart</a>
                        </div>
                    </div>
                </div>
            </div>

            {% endfor %}
        </div>

    {% else %}

        <div class="header-danger">
            <h1>❌ No Course Available at This Moment!</h1>
        </div>

    {% endif %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
